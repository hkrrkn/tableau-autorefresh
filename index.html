<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auto Refresh — Sweetgreen</title>
  <script src="https://extensions.tableau.com/lib/1.11.0/tableau.extensions.1.11.0.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a; color: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 12px;
    }
    .card {
      background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 12px; padding: 18px 20px;
      width: 100%; max-width: 340px;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .logo { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7cba5a; font-weight: 700; }
    .status-line { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #7cba5a; animation: pulse 2s infinite; flex-shrink: 0; }
    .status-dot.inactive { background: #888; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Countdown ── */
    .countdown-wrap { text-align: center; margin-bottom: 10px; }
    .countdown-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 3px; }
    .countdown { font-size: 36px; font-weight: 800; color: #7cba5a; letter-spacing: 3px; line-height: 1; }
    .countdown.warning { color: #e6a817; }

    /* ── Progress bar ── */
    .progress-bar-wrap { background: #333; border-radius: 4px; height: 5px; margin-bottom: 16px; overflow: hidden; }
    .progress-bar { height: 100%; background: #7cba5a; border-radius: 4px; transition: width 1s linear; }
    .progress-bar.warning { background: #e6a817; }

    /* ── Timer Customizer ── */
    .timer-section {
      background: #222; border: 1px solid #3a3a3a; border-radius: 8px;
      padding: 12px; margin-bottom: 14px;
    }
    .timer-section-label {
      font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .timer-section-label span { flex: 1; }
    .active-interval-tag {
      background: #7cba5a22; border: 1px solid #7cba5a55; border-radius: 10px;
      padding: 1px 8px; font-size: 10px; color: #7cba5a; font-weight: 600;
    }

    /* Preset grid */
    .presets {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
      margin-bottom: 10px;
    }
    .preset-btn {
      background: #2e2e2e; border: 1px solid #444; border-radius: 6px;
      color: #bbb; font-size: 12px; font-weight: 600; padding: 7px 2px;
      cursor: pointer; transition: all 0.15s; text-align: center; user-select: none;
    }
    .preset-btn:hover { border-color: #7cba5a99; color: #7cba5a; }
    .preset-btn.active { background: #7cba5a22; border-color: #7cba5a; color: #7cba5a; }

    /* Custom row */
    .custom-row {
      display: flex; align-items: center; gap: 6px;
    }
    .custom-row label { font-size: 10px; color: #666; white-space: nowrap; }
    .custom-row input[type="number"] {
      width: 62px; background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
      color: #f0f0f0; font-size: 14px; font-weight: 700; padding: 5px 8px;
      text-align: center; outline: none;
    }
    .custom-row input[type="number"]:focus { border-color: #7cba5a; }
    .custom-row select {
      flex: 1; background: #1a1a1a; border: 1px solid #444; border-radius: 6px;
      color: #ccc; font-size: 12px; padding: 5px 8px; outline: none; cursor: pointer;
    }
    .custom-row select:focus { border-color: #7cba5a; }
    .btn-apply {
      background: #7cba5a; border: none; border-radius: 6px; color: #fff;
      font-size: 11px; font-weight: 700; padding: 6px 10px; cursor: pointer;
      white-space: nowrap; transition: opacity 0.2s;
    }
    .btn-apply:hover { opacity: 0.85; }
    .apply-feedback { font-size: 10px; color: #7cba5a; margin-top: 5px; display: none; }

    /* ── Action buttons ── */
    .btn-row { display: flex; gap: 7px; }
    .btn-row button {
      flex: 1; padding: 8px 10px; border-radius: 7px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-row button:hover { opacity: .85; }
    #btnPause { background: #7cba5a; color: #fff; }
    #btnNow   { background: #3a3a3a; color: #ccc; border: 1px solid #555; }

    /* ── Footer ── */
    .footer { font-size: 10px; color: #555; margin-top: 10px; text-align: center; }
    .info-msg { font-size: 10px; color: #e06c6c; margin-top: 6px; text-align: center; min-height: 14px; }
  </style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo">⬡ Sweetgreen</div>
    <div class="status-line">
      <span class="status-dot" id="dot"></span>
      <span id="statusText">Loading…</span>
    </div>
  </div>

  <!-- Countdown -->
  <div class="countdown-wrap">
    <div class="countdown-label">Next refresh in</div>
    <div class="countdown" id="countdown">--:--</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:100%"></div>
  </div>

  <!-- ── TIMER CUSTOMIZER ── -->
  <div class="timer-section">
    <div class="timer-section-label">
      <span>⏱ Refresh interval</span>
      <span class="active-interval-tag" id="activeTag">--</span>
    </div>

    <!-- Quick presets -->
    <div class="presets">
      <div class="preset-btn" data-seconds="30">30s</div>
      <div class="preset-btn" data-seconds="60">1m</div>
      <div class="preset-btn" data-seconds="120">2m</div>
      <div class="preset-btn" data-seconds="300">5m</div>
      <div class="preset-btn" data-seconds="600">10m</div>
      <div class="preset-btn" data-seconds="900">15m</div>
      <div class="preset-btn" data-seconds="1800">30m</div>
      <div class="preset-btn" data-seconds="3600">1h</div>
    </div>

    <!-- Custom input -->
    <div class="custom-row">
      <label>Custom:</label>
      <input type="number" id="customValue" min="1" max="999" value="1" />
      <select id="customUnit">
        <option value="seconds">Seconds</option>
        <option value="minutes" selected>Minutes</option>
        <option value="hours">Hours</option>
      </select>
      <button class="btn-apply" id="btnApply">Apply</button>
    </div>
    <div class="apply-feedback" id="applyFeedback">✓ Interval updated</div>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button id="btnPause">⏸ Pause</button>
    <button id="btnNow">↻ Refresh Now</button>
  </div>

  <div class="footer" id="lastRefresh"></div>
  <div class="info-msg"  id="infoMsg"></div>
</div>

<script>
  const DEFAULT_INTERVAL = 60;
  const SETTINGS_KEY     = "refreshIntervalSeconds";

  let intervalSeconds = DEFAULT_INTERVAL;
  let secondsLeft     = DEFAULT_INTERVAL;
  let isPaused        = false;
  let refreshCount    = 0;
  let tableauReady    = false;

  const $dot     = document.getElementById("dot");
  const $status  = document.getElementById("statusText");
  const $cd      = document.getElementById("countdown");
  const $bar     = document.getElementById("progressBar");
  const $tag     = document.getElementById("activeTag");
  const $last    = document.getElementById("lastRefresh");
  const $info    = document.getElementById("infoMsg");
  const $pause   = document.getElementById("btnPause");
  const $now     = document.getElementById("btnNow");
  const $apply   = document.getElementById("btnApply");
  const $fb      = document.getElementById("applyFeedback");

  // ── Helpers ───────────────────────────────────────────────────────────────
  const pad = n => String(n).padStart(2, "0");

  function setStatus(text, active) {
    $status.textContent = text;
    $dot.className = "status-dot" + (active === false ? " inactive" : "");
  }

  function formatInterval(secs) {
    if (secs % 3600 === 0) return secs/3600 + "h";
    if (secs % 60   === 0) return secs/60 + "m";
    return secs + "s";
  }

  function syncUI() {
    $tag.textContent = formatInterval(intervalSeconds);
    document.querySelectorAll(".preset-btn").forEach(btn => {
      btn.classList.toggle("active", parseInt(btn.dataset.seconds) === intervalSeconds);
    });
    // Sync custom fields to match current interval
    if (intervalSeconds % 3600 === 0) {
      document.getElementById("customUnit").value  = "hours";
      document.getElementById("customValue").value = intervalSeconds / 3600;
    } else if (intervalSeconds % 60 === 0) {
      document.getElementById("customUnit").value  = "minutes";
      document.getElementById("customValue").value = intervalSeconds / 60;
    } else {
      document.getElementById("customUnit").value  = "seconds";
      document.getElementById("customValue").value = intervalSeconds;
    }
  }

  function updateCountdown() {
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    $cd.textContent = pad(m) + ":" + pad(s);
    const pct  = (secondsLeft / intervalSeconds) * 100;
    $bar.style.width = pct + "%";
    const warn = secondsLeft <= 10;
    $cd.className  = "countdown"   + (warn ? " warning" : "");
    $bar.className = "progress-bar" + (warn ? " warning" : "");
  }

  // ── Apply a new interval ──────────────────────────────────────────────────
  function applyInterval(secs) {
    if (isNaN(secs) || secs < 5) { $info.textContent = "Minimum is 5 seconds."; return; }
    $info.textContent = "";
    intervalSeconds = secs;
    secondsLeft     = secs;
    syncUI();
    if (tableauReady) {
      tableau.extensions.settings.set(SETTINGS_KEY, String(secs));
      tableau.extensions.settings.saveAsync().catch(() => {});
    }
    $fb.style.display = "block";
    setTimeout(() => { $fb.style.display = "none"; }, 1800);
  }

  // ── Refresh data sources ──────────────────────────────────────────────────
  async function doRefresh() {
    if (!tableauReady) { $info.textContent = "Tableau not ready — retrying next cycle"; return; }
    setStatus("Refreshing…");
    $info.textContent = "";
    try {
      const db   = tableau.extensions.dashboardContent.dashboard;
      const seen = new Map();
      for (const ws of db.worksheets) {
        for (const ds of await ws.getDataSourcesAsync()) {
          if (!seen.has(ds.id)) seen.set(ds.id, ds);
        }
      }
      await Promise.all([...seen.values()].map(ds => ds.refreshAsync()));
      refreshCount++;
      $last.textContent = "Last refresh: " + new Date().toLocaleTimeString() + " (×" + refreshCount + ")";
      setStatus("Live — auto-refreshing");
    } catch (e) {
      $info.textContent = "Refresh error: " + e.message;
      setStatus("Error — retrying next cycle", false);
    }
  }

  // ── Countdown tick ────────────────────────────────────────────────────────
  function tick() {
    if (!isPaused) {
      if (secondsLeft <= 0) { secondsLeft = intervalSeconds; doRefresh(); }
      updateCountdown();
      secondsLeft--;
    }
    setTimeout(tick, 1000);
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  syncUI();
  setStatus("Starting…");
  tick();

  tableau.extensions.initializeAsync().then(() => {
    tableauReady = true;
    const saved = parseInt(tableau.extensions.settings.get(SETTINGS_KEY));
    if (!isNaN(saved) && saved >= 5) {
      intervalSeconds = saved;
      secondsLeft     = saved;
      syncUI();
    }
    setStatus("Live — auto-refreshing");
    $info.textContent = "";
  }).catch(err => {
    tableauReady = false;
    setStatus("Tableau init failed", false);
    $info.textContent = "No datasource refresh. " + (err.message || "");
  });

  // ── Preset buttons ────────────────────────────────────────────────────────
  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => applyInterval(parseInt(btn.dataset.seconds)));
  });

  // ── Custom input ──────────────────────────────────────────────────────────
  ["customValue", "customUnit"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
      document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
      $tag.textContent = "custom";
    });
  });

  $apply.addEventListener("click", () => {
    const value = parseInt(document.getElementById("customValue").value);
    const unit  = document.getElementById("customUnit").value;
    if (isNaN(value) || value < 1) { $info.textContent = "Enter a valid number."; return; }
    const secs = unit === "hours" ? value * 3600 : unit === "minutes" ? value * 60 : value;
    applyInterval(secs);
  });

  // ── Pause / Resume ────────────────────────────────────────────────────────
  $pause.addEventListener("click", () => {
    isPaused = !isPaused;
    $pause.textContent      = isPaused ? "▶ Resume" : "⏸ Pause";
    $pause.style.background = isPaused ? "#666"     : "#7cba5a";
    setStatus(isPaused ? "Paused" : "Live — auto-refreshing", !isPaused);
  });

  // ── Refresh Now ───────────────────────────────────────────────────────────
  $now.addEventListener("click", () => { secondsLeft = intervalSeconds; doRefresh(); });
</script>
</body>
</html>
